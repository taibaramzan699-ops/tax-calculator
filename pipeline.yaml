- name: build
      taskRef:
        name: buildah
        kind: ClusterTask
      runAfter:
        - tests
      workspaces:
        - name: source
          workspace: pipeline-workspace
      params:
        - name: IMAGE
          value: "$(params.image-name)"
        - name: CONTEXT
          value: "$(params.path-to-context)"
        - name: DOCKERFILE
          value: "$(params.path-to-dockerfile)/Dockerfile"
