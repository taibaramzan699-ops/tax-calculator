apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: tax-calculator-pipeline-run
spec:
  pipelineRef:
    name: tax-calculator-pipeline
  serviceAccountName: pipeline
  params:
    - name: repo-url
      value: "https://github.com/taibaramzan699-ops/tax-calculator.git"
    - name: path-to-context
      value: "."
    - name: path-to-dockerfile
      value: "."
    - name: image-name
      value: "us.icr.io/sn-labs-taibaramzan6/tax-calculator:latest"
  workspaces:
    - name: pipeline-workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: skills-network-learner
          resources:
            requests:
              storage: 1Gi
