apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: tax-calculator-pipeline-run
spec:
  pipelineRef:
    name: tax-calculator-pipeline
  params:
    - name: repo-url
      value: "https://github.com/YOUR_USERNAME/tax-calculator.git"
    - name: path-to-context
      value: "."
    - name: path-to-dockerfile
      value: "."
    - name: image-name
      value: "us.icr.io/YOUR_NAMESPACE/tax-calculator:latest"
  workspaces:
    - name: pipeline-workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
